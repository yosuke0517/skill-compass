services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: skill_compass
      MYSQL_USER: skill_compass
      MYSQL_PASSWORD: skill_compass
      MYSQL_ROOT_PASSWORD: skill_compass_root
    ports:
      - "3306:3306"
    volumes:
      - skill-compass-mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  skill-compass-mysql:
